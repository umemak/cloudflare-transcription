name: Deploy to Cloudflare Pages

on:
  push:
    branches:
      - main

jobs:
  deploy:
    runs-on: ubuntu-latest
    name: Deploy
    
    steps:
      - name: Checkout
        uses: actions/checkout@v4
      
      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
      
      - name: Install dependencies
        run: npm ci
      
      - name: Download FFmpeg.wasm files
        run: npm run setup:ffmpeg
      
      - name: Build
        run: npm run build
      
      - name: Check if D1 database is configured
        id: check_d1
        run: |
          if grep -q '"database_id": ""' wrangler.jsonc; then
            echo "D1 database not configured, skipping migrations"
            echo "skip_migration=true" >> $GITHUB_OUTPUT
          else
            echo "D1 database configured, will run migrations"
            echo "skip_migration=false" >> $GITHUB_OUTPUT
          fi
      
      - name: Run D1 Migrations
        if: steps.check_d1.outputs.skip_migration == 'false'
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: d1 migrations apply cloudflare-transcription-db --remote
      
      - name: Deploy to Cloudflare Pages
        uses: cloudflare/wrangler-action@v3
        with:
          apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          accountId: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          command: pages deploy dist --project-name=webapp
